hostname core-sw-01
!
vlan 10
 name Users
vlan 20
 name Servers
!
interface Vlan10
 description Users SVI
 ip address 10.10.10.1 255.255.255.0
 ip access-group USERS-IN in
!
interface Vlan20
 description Servers SVI
 ip address 10.10.20.1 255.255.255.0
!
interface GigabitEthernet1/0/1
 description user access port
 switchport mode access
 switchport access vlan 10
!
interface GigabitEthernet1/0/48
 description uplink trunk
 switchport mode trunk
 switchport trunk allowed vlan 10,20
!
ip route 10.30.0.0 255.255.0.0 10.10.20.254
!
ip access-list extended USERS-IN
 10 permit tcp 10.10.10.0 0.0.0.255 host 10.10.20.50 eq 443
 20 deny ip any any log
